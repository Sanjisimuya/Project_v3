kind = "web"
previewPath = "/"
title = "DompetKu"
version = "1.0.0"
id = "artifacts/dompetku"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20380

[services.development]
run = "pnpm --filter @workspace/dompetku run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dompetku", "run", "build" ]
serve = "static"
publicDir = "artifacts/dompetku/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20380"
BASE_PATH = "/"
